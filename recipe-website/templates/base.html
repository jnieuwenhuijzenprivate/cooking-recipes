<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <title>{% block title %}My Recipe Book{% endblock %}</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50:  '#fff7ed',
                            100: '#ffedd5',
                            200: '#fed7aa',
                            300: '#fdba74',
                            400: '#fb923c',
                            500: '#f97316',
                            600: '#ea580c',
                            700: '#c2410c',
                            800: '#9a3412',
                            900: '#7c2d12',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Smooth transitions */
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .recipe-card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
        .recipe-card:active { transform: scale(0.98); }
        /* Hide scrollbar but keep scroll */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* Bottom nav safe area for phones with home indicator */
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen pb-20">

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="fixed top-4 left-4 right-4 z-50 space-y-2" id="flash-messages">
        {% for category, message in messages %}
        <div class="p-3 rounded-xl shadow-lg text-sm font-medium
            {% if category == 'error' %}bg-red-100 text-red-800 border border-red-200
            {% else %}bg-green-100 text-green-800 border border-green-200{% endif %}"
            onclick="this.remove()">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    <script>
        setTimeout(() => {
            document.getElementById('flash-messages')?.remove();
        }, 3000);
    </script>
    {% endif %}
    {% endwith %}

    <!-- Main content -->
    <main class="max-w-2xl mx-auto px-4 pt-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Bottom Navigation Bar (mobile-friendly) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 safe-bottom z-40">
        <div class="max-w-2xl mx-auto flex justify-around items-center h-16">
            <a href="{{ url_for('index') }}"
               class="flex flex-col items-center justify-center w-full h-full
                      {% if request.endpoint == 'index' %}text-brand-500{% else %}text-gray-400{% endif %}">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/>
                </svg>
                <span class="text-xs mt-1">Home</span>
            </a>
            <a href="{{ url_for('recipe_new') }}"
               class="flex flex-col items-center justify-center w-full h-full">
                <div class="bg-brand-500 rounded-full p-3 -mt-5 shadow-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                </div>
                <span class="text-xs mt-1 text-brand-500 font-medium">Add</span>
            </a>
        </div>
    </nav>

    {% block scripts %}{% endblock %}

    <!-- Register service worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
